# Gradle / JVM 配置
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.parallel=true

# AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true

# AAPT2 在部分 Windows 环境下 daemon 子进程启动失败（"Please check if you installed
# the Windows Universal C Runtime"），关闭 daemon 模式改用进程内编译可规避。
android.aapt2DaemonMode=false

# Kotlin 官方代码风格
kotlin.code.style=official

# 关闭 kapt 增量注解处理。Hilt 2.51.x 的 RootProcessor.getSupportedOptions() 会提前访问
# processingEnv（经 additionalProcessingOptions），而 kapt 的 IncrementalProcessor 包装器在
# init() 之前就调用 getSupportedOptions()，导致 "processingEnv must not be null" 的 NPE。
# 关闭增量处理后，Java 编译器会先调用 init() 再调用 getSupportedOptions()，从而规避该问题。
kapt.incremental.apt=false
